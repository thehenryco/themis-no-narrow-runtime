name: public-harness

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  public-harness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run public Themis harness
        run: python tests/public_harness.py
